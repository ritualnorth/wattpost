# WattPost appliance — example docker-compose for Linux hosts.
#
# Copy this to docker-compose.yml in a working directory, then:
#   docker compose up -d
#   open http://localhost:8000   (or http://<this-host-ip>:8000)
#
# Updates: the watchtower sidecar at the bottom polls GHCR daily and
#   restarts wattpost when a new tag lands. Same sidecar is what the
#   cloud's "Update now" button drives — it POSTs to the local
#   watchtower HTTP API and gets an instant pull + restart.
#   To control updates manually instead, comment out the watchtower
#   service and run `docker compose pull && docker compose up -d`.
#
# Linux host only — macOS / Windows / WSL2 can't pass host Bluetooth
# through to a container. For those, use the SD-card image (Pi) or
# any Linux host with BLE (cheap Mini PC, NUC, recycled laptop, etc).

services:
  wattpost:
    image: ghcr.io/ritualnorth/wattpost-appliance:latest
    container_name: wattpost

    # Host networking is the simplest path to BLE on Linux. The
    # alternative (cap_add + dbus bind-mount) works on most distros
    # but bluez integration varies by version — host mode is the path
    # we test. Trade-off: the container shares the host's network
    # namespace, so :8000 binds the host directly.
    network_mode: host

    # Bluetooth on Linux Docker requires:
    #   1. The host's system DBus socket. /var/run/dbus is a symlink
    #      to /run/dbus on most modern distros — mount the source
    #      explicitly so Docker doesn't get confused.
    #   2. NET_ADMIN + SYS_ADMIN caps for BLE scan + bluez ops.
    #   3. AppArmor unconfined — the default docker profile blocks
    #      the container from talking through the system bus socket
    #      on Ubuntu / Debian hosts. Without this, bluetoothctl in
    #      the container fails with "connection != NULL" assertion.
    #   If your distro's bluez is patchy with this combo, replace
    #   the three options below with `privileged: true` (bigger
    #   hammer, equivalent result).
    volumes:
      - /run/dbus:/var/run/dbus
      # Persist config + history across `docker compose pull`.
      - ./wattpost-config:/etc/wattpost
      - ./wattpost-data:/var/lib/wattpost
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined

    # On startup the entrypoint drops a default /etc/wattpost/config.yaml
    # the first time the volume is empty, then runs `solar-monitor serve`.
    restart: unless-stopped

    environment:
      # Tells the daemon to find the watchtower sidecar at this URL
      # for cloud-triggered updates. If unset, cloud Update-now is
      # refused with "no updater available". Match the token in the
      # watchtower service below — generate once with
      #   openssl rand -hex 32
      # and paste the same value in both places. Keep it secret; it
      # gives anyone who reaches the watchtower port full control of
      # this container.
      WATTPOST_DEPLOYMENT: docker
      WATCHTOWER_URL:   "http://localhost:8080"
      WATCHTOWER_TOKEN: "REPLACE_WITH_OPENSSL_RAND_HEX_32"

    # Pulled by watchtower below — the label tells it to watch this
    # container specifically and ignore anything else on the host.
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ────────────────────────────────────────────────────────────────
  # Watchtower sidecar — drives both scheduled auto-updates and the
  # cloud's "Update now" button.
  #
  # Without this service, cloud Update-now is refused (Pi installs use
  # wattpost-update; Docker has no equivalent helper otherwise) and
  # the appliance only gets new image tags when the human runs
  # `docker compose pull` by hand.
  #
  # With it:
  #   - Cloud "Update now" → daemon POSTs http://localhost:8080/v1/update
  #     with the bearer token → watchtower pulls + restarts wattpost.
  #   - Auto-apply: polls GHCR every WATCHTOWER_POLL_INTERVAL seconds
  #     (default 86400 = daily) for the wattpost image and restarts
  #     on new tag. Disable by setting WATCHTOWER_HTTP_API_PERIODIC_POLLS=false.
  # ────────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: wattpost-watchtower
    restart: unless-stopped
    # Host networking so the daemon can reach localhost:8080 cleanly
    # (the wattpost container also uses host networking above).
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"        # only touch labelled containers
      WATCHTOWER_CLEANUP: "true"             # prune old images after restart
      WATCHTOWER_INCLUDE_RESTARTING: "true"  # don't stall on container restart loops
      WATCHTOWER_HTTP_API_UPDATE: "true"     # enable POST /v1/update
      WATCHTOWER_HTTP_API_PERIODIC_POLLS: "true"
      WATCHTOWER_POLL_INTERVAL: "86400"      # daily auto-poll
      # Match the token in the wattpost service above. Anyone with
      # this token + network reach to :8080 can force-restart any
      # labelled container — don't expose this port outside the box.
      WATCHTOWER_HTTP_API_TOKEN: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
