name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please do not include
        secrets, tokens, or cloud pairing codes in the report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WattPost version
      description: Shown in Settings, or run `solar-monitor --version`.
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install type
      options:
        - Raspberry Pi (SD image)
        - Docker
        - Manual / other
    validations:
      required: true
  - type: textarea
    id: hardware
    attributes:
      label: Hardware involved (battery / charger / shunt / inverter)
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
