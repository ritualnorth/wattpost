name: Build demo image

# Builds the appliance Docker image (used by demo.wattpost.io) on every
# main push that touches the appliance source. Pushes to GHCR; the
# next-step SSH-deploy pulls + restarts the wattpost-demo container.
#
# Independent of the appliance/updater image builds; shares the
# same runner pool.

on:
  push:
    branches: [main]
    paths:
      - 'solar_monitor/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/build-demo-image.yml'
  workflow_dispatch:

# Coalesce so a flurry of commits to main only rebuilds the demo
# image once. demo.wattpost.io always reflects the newest build
# anyway.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wattpost-demo

jobs:
  build-and-push:
    name: Build + push to GHCR
    runs-on: [self-hosted, linux, x64]
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: [self-hosted, linux, x64]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH-deploy (compose pull + up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/vps-infra
            git fetch --prune origin main
            current_branch=$(git rev-parse --abbrev-ref HEAD)
            if [ "$current_branch" != "main" ]; then
              git checkout main
            fi
            git pull --ff-only origin main
            docker compose pull wattpost-demo
            docker compose up -d wattpost-demo
            # Hot-reload Caddy so it picks up any Caddyfile change that
            # rode along with this deploy (e.g. a new site block for
            # demo.wattpost.io). Hot reload is much faster than restart
            # and doesn't drop in-flight connections on the other sites.
            docker exec shared-caddy caddy reload --config /etc/caddy/Caddyfile || true
            # Prune can race with concurrent deploys ("a prune operation
            # is already running") — non-fatal, the next deploy will tidy.
            docker image prune -f --filter "label=org.opencontainers.image.source=https://github.com/ritualnorth/wattpost" || true
