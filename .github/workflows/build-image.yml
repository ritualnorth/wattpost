name: Build SD image

# Triggers:
#   - Pushing ANY v* tag (v0.0.1, v0.1.0, v1.0.0…) → builds + attaches
#     the .img.xz to a real GitHub Release. We tightened this to
#     minor/major-only briefly to save GH Actions minutes; now we run
#     on the self-hosted VPS runner instead (zero minutes cost), so
#     every tag can produce an SD image again.
#   - workflow_dispatch → builds + uploads as a workflow artefact
#     (no release). Useful for one-off images on demand, smoke-
#     testing the pipeline, or cutting an out-of-band SD image off
#     a branch ref.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Coalesce back-to-back tag pushes. Pi-gen runs in a shared
# `pigen-builder` Docker container on the self-hosted runner; two
# parallel runs collide with "The build is already running in
# container pigen-builder. Aborting." which manifested as a stream
# of failure emails when a rapid sequence of patch tags landed in
# one session. Cancelling the older queued/running build is the
# right behaviour anyway — only the newest SD image is what
# customers download from /download.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create the release on tag push

jobs:
  build:
    name: pi-gen build (x86_64 + qemu)
    # Self-hosted runner on our Contabo VPS — eliminates
    # the ~90 min per-build hit on the ritualnorth account's 3000 GH
    # Actions min/mo. The runner is Ubuntu 24.04 too (matches what
    # GitHub-hosted ubuntu-24.04 was), so qemu-user-static 8.x is
    # available the same way (Python 3.13 segfaults under the older
    # 6.x that Ubuntu 22.04 shipped — see workflow history).
    # Label "pi-gen" is unique to the WattPost-bound runner so the
    # sevops runners (incident-commander) can't accidentally pick up
    # our jobs.
    runs-on: [self-hosted, linux, x64, pi-gen]
    # Pi-gen under qemu on the VPS takes ~90 min. Generous timeout
    # for apt mirror wobbles.
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # release notes generation needs full history

      # pi-gen builds a rootfs from scratch into the host filesystem;
      # GH-hosted runners default to ~14 GB free after the preinstalled
      # toolchains, which is tight. Free up ~25 GB by dropping bits we
      # don't need (Haskell, .NET, Android SDK, etc).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install pi-gen build dependencies (Docker-mode build)
        # qemu-user-static here only satisfies build-docker.sh's
        # `which qemu-aarch64` preflight — the actual emulation runs
        # through the binfmt handlers installed by the action below,
        # which uses qemu 9.x (host's apt qemu is unused at runtime).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git qemu-user-static

      - name: Set up QEMU (newer binfmt + qemu 9.x)
        # tonistiigi/binfmt:latest ships qemu 9.x with the arm64
        # mmap/segfault fixes that bit pi-gen #12 and #14
        # (Python 3.13 cache_tag invocation under qemu crashed with
        # SIGSEGV intermittently — flaky under Ubuntu's apt qemu, even
        # the 24.04 8.x version). Pinning to this action removes that
        # whole class of failures.
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: arm64,arm

      - name: Build image
        run: |
          ./packaging/build-image.sh

      - name: Locate artefact
        id: locate
        run: |
          set -euo pipefail
          # Pi-gen runs the actual build under sudo, so build/pi-gen/
          # ends up root-owned. Reclaim ownership for the runner user
          # so subsequent steps (sha256, upload, scp) can write to it.
          sudo chown -R "$(id -u):$(id -g)" build/pi-gen/deploy
          IMG=$(find build/pi-gen/deploy -maxdepth 2 -name '*.img.xz' -type f | head -n1)
          if [ -z "$IMG" ]; then
            echo "No .img.xz under build/pi-gen/deploy:" >&2
            ls -laR build/pi-gen/deploy || true
            exit 1
          fi
          # Produce a sidecar SHA256 so users can verify the download.
          ( cd "$(dirname "$IMG")" && sha256sum "$(basename "$IMG")" > "$(basename "$IMG").sha256" )
          echo "image=$IMG"           >> "$GITHUB_OUTPUT"
          echo "checksum=$IMG.sha256" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$IMG")" >> "$GITHUB_OUTPUT"

      # NB: we used to upload-artifact the .img.xz here for manual-run
      # convenience. Removed 2026-05-21 because (a) self-hosted runners
      # made the SD images live on the runner's disk and ALSO get scp'd
      # to releases.wattpost.io/img/ (the actual public distribution),
      # so the GitHub copy was redundant; and (b) at ~570 MB per build
      # × 14 d retention the cumulative artefact storage blew through
      # the 2 GB free tier in ~3-4 builds. If you need the image on a
      # manual test run, grab it from releases.wattpost.io/img/ — the
      # scp step uploads it whether or not we're on a tag push.

      # On tag pushes only: attach to a GitHub Release. action-gh-release
      # creates the release if it doesn't exist, or appends to an
      # existing one — so we can re-run on the same tag to repair a
      # failed upload without losing the original release body.
      # Private repo → these assets aren't anonymously downloadable;
      # the public-facing copy is the scp-to-VPS step below.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.locate.outputs.image }}
            ${{ steps.locate.outputs.checksum }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Public-facing release channel: scp the .img.xz + sha256 to the
      # VPS at /srv/wattpost-releases/img/, which the shared-caddy
      # container serves anonymously as releases.wattpost.io. The
      # private repo's GH-release path above stays as an internal
      # archive; this is what end-users actually hit.
      #
      # NOT using appleboy/scp-action — that's a Docker action, and
      # pi-gen's 90-minute build seems to disrupt GH Actions' internal
      # Docker state (the action's image gets garbage-collected). Plain
      # ssh/scp commands have no such dependency.
      - name: Publish to releases.wattpost.io (scp) + symlink update
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          SSH_KEY:  ${{ secrets.VPS_SSH_KEY }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
          IMG:      ${{ steps.locate.outputs.image }}
          CHECKSUM: ${{ steps.locate.outputs.checksum }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printenv SSH_KEY > ~/.ssh/id_release
          chmod 0600 ~/.ssh/id_release
          # ssh-keyscan can transiently fail (DNS race, network blip on
          # the GH runner side); a failure here used to bail the script
          # via `set -e` with NO output (because of the 2>/dev/null mute).
          # Log + tolerate it: known_hosts is just an optimisation —
          # the actual SSH calls below set StrictHostKeyChecking=accept-new
          # so they discover the host themselves on first connect.
          if ! ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
            echo "warn: ssh-keyscan failed, ssh will discover the host on first connect" >&2
          fi

          # Azure (runner) → Contabo path silently drops idle TCP every
          # so often. Keepalives surface a dead connection in ~60s
          # instead of waiting out the 6h job timeout, and ConnectTimeout
          # caps the initial dial. ServerAliveCountMax=4 keeps long scp
          # transfers alive even through a brief network hiccup.
          SSH_COMMON=(-i ~/.ssh/id_release
                      -o BatchMode=yes
                      -o ConnectTimeout=20
                      -o ServerAliveInterval=15
                      -o ServerAliveCountMax=4
                      -o StrictHostKeyChecking=accept-new)

          # Retry helper. Pi-gen takes ~90 minutes, then we try to
          # publish; by then the runner is on a relatively old Azure
          # NAT and Contabo route flaps can knock SSH out for 5-10
          # minutes at a stretch. Old config (3 retries, ~60s total
          # wait) bailed before routes recovered.
          #
          # New: 8 attempts, exponential backoff capped at 5 min, so
          # total wait is ~25 minutes before giving up. Pi-gen images
          # are valuable (~90 min of compute), worth waiting on a
          # transient route. The artefact is also attached to a GH
          # Release in the previous step, so a failed publish here
          # doesn't lose the image — operator can scp it manually
          # from the artefact (see docs/release-pipeline.md).
          retry() {
            local n=0
            local delays=(10 30 60 120 240 300 300 300)
            until "$@"; do
              n=$((n+1))
              if [ "$n" -ge "${#delays[@]}" ]; then
                echo "FAIL after $n attempts: $*" >&2
                return 1
              fi
              local d="${delays[$((n-1))]}"
              echo "retry $n in ${d}s: $*" >&2
              sleep "$d"
            done
          }

          # Preflight: confirm we can open a session at all.
          retry ssh -v "${SSH_COMMON[@]}" \
              "${SSH_USER}@${SSH_HOST}" 'echo OK_AUTH'
          # Upload both artefacts.
          retry scp -v "${SSH_COMMON[@]}" "$IMG" "$CHECKSUM" \
              "${SSH_USER}@${SSH_HOST}:/srv/wattpost-releases/img/"
          # Build the manifest.json the cloud reads at request time.
          # Cloud's releases.get_latest() fetches this file every 60s,
          # so within a couple minutes of this scp finishing, the
          # /download page + /api/releases/latest reflect the new
          # build automatically. No commit-to-cloud step.
          VERSION=$(grep -E '^__version__' solar_monitor/__init__.py \
                    | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          # Channel routing (#11). A semver pre-release (a hyphen in the
          # version, e.g. 0.2.0-rc1) publishes to BETA only; a final
          # version publishes to STABLE and is then mirrored into beta
          # (a final release is the newest beta too). RC builds therefore
          # never touch the stable manifest/image.
          case "$VERSION" in
            *-*) CHANNEL=beta ;;
            *)   CHANNEL=stable ;;
          esac
          if [ "$CHANNEL" = beta ]; then
            MANIFEST_NAME=manifest-beta.json; IMG_LINK=beta.img.xz;   SRC_LINK=beta.tar.gz
          else
            MANIFEST_NAME=manifest.json;      IMG_LINK=latest.img.xz; SRC_LINK=latest.tar.gz
          fi
          echo "publishing $VERSION -> channel=$CHANNEL (manifest=$MANIFEST_NAME img=$IMG_LINK)"

          # No-downgrade guard, per channel. A tag force-push re-fires
          # this workflow for old tags; refuse to roll THIS channel's
          # manifest backwards (incident 2026-05-28: a re-run of v0.0.35
          # clobbered the manifest to 0.0.35).
          CUR_RAW=$(ssh "${SSH_COMMON[@]}" "${SSH_USER}@${SSH_HOST}" \
            "grep -oE '\"version\"[^,]*' /srv/wattpost-releases/img/${MANIFEST_NAME} 2>/dev/null | head -1" || echo "")
          CUR=$(printf '%s' "$CUR_RAW" | sed -E 's/.*"([0-9][^"]*)".*/\1/')
          if [ -n "$CUR" ] && [ "$CUR" != "$VERSION" ] \
             && [ "$(printf '%s\n%s\n' "$CUR" "$VERSION" | sort -V | tail -1)" = "$CUR" ]; then
            echo "no-downgrade: $CHANNEL channel at $CUR, this build is $VERSION -- skipping publish"
            exit 0
          fi
          SHA=$(awk '{print $1}' "$CHECKSUM")
          SIZE=$(stat -c %s "$IMG")
          FNAME=$(basename "$IMG")
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Emit + scp a channel manifest, then repoint that channel's
          # image symlink. image_url / source_url use the channel's
          # stable symlink names so an appliance on this channel always
          # pulls channel-appropriate artefacts.
          publish_channel() {
            local ch="$1" out="$2" img_link="$3" src_link="$4"
            cat > /tmp/${out} <<JSON
          {
            "version":      "${VERSION}",
            "released_at":  "${NOW}",
            "channel":      "${ch}",
            "image_filename": "${FNAME}",
            "image_url":    "https://releases.wattpost.io/img/${img_link}",
            "sha256":       "${SHA}",
            "sha256_url":   "https://releases.wattpost.io/img/${img_link}.sha256",
            "size_bytes":   ${SIZE},
            "release_url":  "/docs/release-notes",
            "source_url":   "https://releases.wattpost.io/source/${src_link}",
            "source_sha256_url": "https://releases.wattpost.io/source/${src_link}.sha256"
          }
          JSON
            retry scp "${SSH_COMMON[@]}" /tmp/${out} \
                "${SSH_USER}@${SSH_HOST}:/srv/wattpost-releases/img/${out}"
            retry ssh "${SSH_COMMON[@]}" "${SSH_USER}@${SSH_HOST}" "
              set -euo pipefail
              cd /srv/wattpost-releases/img
              ln -sfn '${FNAME}' '${img_link}'
              ln -sfn '${FNAME}.sha256' '${img_link}.sha256'
              echo '${img_link} -> ${FNAME}'
            "
          }
          publish_channel "${CHANNEL}" "${MANIFEST_NAME}" "${IMG_LINK}" "${SRC_LINK}"
          # Also publish CHANGELOG.md at the releases root — the
          # appliance update checker fetches it so the dashboard can
          # preview release notes before the user installs.
          retry scp "${SSH_COMMON[@]}" CHANGELOG.md \
              "${SSH_USER}@${SSH_HOST}:/srv/wattpost-releases/CHANGELOG.md"
          # A final release is the newest beta too — mirror it so beta
          # testers never fall BEHIND stable. Pre-releases already wrote
          # beta directly above, so only mirror when we just did stable.
          if [ "$CHANNEL" = stable ]; then
            publish_channel "beta" "manifest-beta.json" "beta.img.xz" "beta.tar.gz"
          fi
