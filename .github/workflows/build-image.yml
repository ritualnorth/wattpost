name: Build SD image

# Triggers:
#   - Pushing ANY v* tag (v0.0.1, v0.1.0, v1.0.0…) → builds + attaches
#     the .img.xz to a real GitHub Release.
#   - workflow_dispatch → builds + uploads as a workflow artefact
#     (no release). Useful for one-off images on demand, smoke-
#     testing the pipeline, or cutting an out-of-band SD image off
#     a branch ref.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Coalesce back-to-back tag pushes: only the newest SD image is what
# customers download from /download, so cancelling an older
# queued/running build is the right behaviour.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create the release on tag push

jobs:
  build:
    name: pi-gen build (x86_64 + qemu)
    runs-on: ubuntu-latest
    # Pi-gen under qemu takes ~90 min. Generous timeout for apt mirror
    # wobbles; the runner is freed of pre-installed toolchains below to
    # make room for the rootfs build.
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # release notes generation needs full history

      # pi-gen builds a rootfs from scratch into the host filesystem;
      # GH-hosted runners default to ~14 GB free after the preinstalled
      # toolchains, which is tight. Free up ~25 GB by dropping bits we
      # don't need (Haskell, .NET, Android SDK, etc).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install pi-gen build dependencies (Docker-mode build)
        # qemu-user-static here only satisfies build-docker.sh's
        # `which qemu-aarch64` preflight — the actual emulation runs
        # through the binfmt handlers installed by the action below,
        # which uses qemu 9.x (host's apt qemu is unused at runtime).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git qemu-user-static

      - name: Set up QEMU (newer binfmt + qemu 9.x)
        # tonistiigi/binfmt:latest ships qemu 9.x with the arm64
        # mmap/segfault fixes that bit pi-gen #12 and #14
        # (Python 3.13 cache_tag invocation under qemu crashed with
        # SIGSEGV intermittently — flaky under Ubuntu's apt qemu, even
        # the 24.04 8.x version). Pinning to this action removes that
        # whole class of failures.
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: arm64,arm

      - name: Build image
        run: |
          ./packaging/build-image.sh

      - name: Locate artefact
        id: locate
        run: |
          set -euo pipefail
          # Pi-gen runs the actual build under sudo, so build/pi-gen/
          # ends up root-owned. Reclaim ownership for the runner user
          # so subsequent steps (sha256, upload, scp) can write to it.
          sudo chown -R "$(id -u):$(id -g)" build/pi-gen/deploy
          IMG=$(find build/pi-gen/deploy -maxdepth 2 -name '*.img.xz' -type f | head -n1)
          if [ -z "$IMG" ]; then
            echo "No .img.xz under build/pi-gen/deploy:" >&2
            ls -laR build/pi-gen/deploy || true
            exit 1
          fi
          # Produce a sidecar SHA256 so users can verify the download.
          ( cd "$(dirname "$IMG")" && sha256sum "$(basename "$IMG")" > "$(basename "$IMG").sha256" )
          echo "image=$IMG"           >> "$GITHUB_OUTPUT"
          echo "checksum=$IMG.sha256" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$IMG")" >> "$GITHUB_OUTPUT"

      # Guard against shipping an image that built but has no WattPost on
      # it — the v0.1.167 regression, where pi-gen exported the lite base
      # captured before stage-wattpost ran. Mount the produced rootfs and
      # assert the install actually landed. Fails the build (and so blocks
      # the release attach below) if anything's missing.
      - name: Verify image contains WattPost
        run: |
          set -euo pipefail
          IMG='${{ steps.locate.outputs.image }}'
          WORK=$(mktemp -d)
          echo "==> decompressing $IMG"
          xz -dc "$IMG" > "$WORK/check.img"
          LOOP=$(sudo losetup --show -fP "$WORK/check.img")
          MNT=$(mktemp -d)
          cleanup() { sudo umount "$MNT" 2>/dev/null || true; sudo losetup -d "$LOOP" 2>/dev/null || true; rm -rf "$WORK"; }
          trap cleanup EXIT
          # pi-gen layout: p1 = boot/firmware (FAT), p2 = rootfs (ext4).
          sudo mount "${LOOP}p2" "$MNT"
          echo "==> asserting WattPost install on the rootfs"
          fail=0
          # /opt/wattpost is a symlink to the active slot (/opt/wattpost-slots/a),
          # and systemd enable symlinks are absolute too. Following them with a
          # bare `test -e "$MNT$p"` resolves the absolute target against the CI
          # HOST root, not the mounted image — a false negative. Resolve the
          # app root inside $MNT, and check the enable link as a symlink (-L)
          # rather than following it.
          approot="/opt/wattpost"
          if sudo test -L "$MNT/opt/wattpost"; then
            approot="$(sudo readlink "$MNT/opt/wattpost")"   # e.g. /opt/wattpost-slots/a
          fi
          for p in \
            "${approot}/venv/bin/solar-monitor" \
            /etc/systemd/system/wattpost.service \
            /etc/wattpost/port.env ; do
            if sudo test -e "$MNT$p"; then echo "  OK       $p"; else echo "  MISSING  $p"; fail=1; fi
          done
          # Enable symlink: assert it EXISTS as a link (don't follow its
          # absolute target against the host root).
          if sudo test -L "$MNT/etc/systemd/system/multi-user.target.wants/wattpost.service"; then
            echo "  OK       wattpost.service enabled (multi-user.target.wants)"
          else
            echo "  MISSING  wattpost.service enable symlink"; fail=1
          fi
          if sudo grep -q '^wattpost:' "$MNT/etc/passwd"; then echo "  OK       wattpost system user"; else echo "  MISSING  wattpost system user"; fail=1; fi
          if [ "$fail" != 0 ]; then
            echo "::error::Built SD image is missing the WattPost install — refusing to publish (the lite-base export regression). Check stage-wattpost/EXPORT_IMAGE."
            exit 1
          fi
          echo "==> image verified: WattPost is installed."

      # NB: we don't upload-artifact the .img.xz — at ~570 MB per build
      # × 14 d retention it blew through the 2 GB free artefact tier in
      # ~3-4 builds. The image is attached to the GitHub Release below;
      # grab it from there for a manual test run.

      # On tag pushes only: attach the .img.xz + sha256 to a GitHub
      # Release — the canonical public download (the /download page and
      # the cloud's /api/releases/latest both resolve to it).
      # action-gh-release creates the release if absent or appends to an
      # existing one, so a re-run on the same tag repairs a failed upload
      # without losing the release body.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.locate.outputs.image }}
            ${{ steps.locate.outputs.checksum }}
          generate_release_notes: true
          # RC tags (v…-rcN) publish as prereleases so the cloud's beta
          # channel finds them and `releases/latest` stays on the last
          # stable build.
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
