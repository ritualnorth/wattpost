name: Build updater image

# Wattpost-owned updater container — minimal Watchtower replacement
# that works on Docker engine 29+ (Ubuntu 24.04 LTS default). Same
# HTTP API shape as Watchtower so the appliance code path doesn't
# change.
#
# Multi-arch (amd64 + arm64); pushed to GHCR on every commit that
# touches updater/.

on:
  # Tags only — the updater sidecar image ships with releases (:beta on
  # pre-releases, :latest on finals). The old main-push :edge build was
  # retired with the Edge channel.
  push:
    tags:    ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wattpost-updater

jobs:
  build-and-push:
    name: Build + push updater image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: ./updater
          file: ./updater/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
