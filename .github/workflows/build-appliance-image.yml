name: Build appliance image

# Multi-arch (amd64 + arm64) Docker image for the WattPost appliance.
# Published to GHCR on every push to main that touches the appliance
# source. Users on a Linux host can `docker compose pull` to take
# updates — the in-container equivalent of the Pi's "Update now" button.
#
# Arm64 is the Pi 4 / Pi 5 case; amd64 covers homelab boxes, mini PCs,
# recycled laptops. Buildx with both targets in one workflow.

on:
  # Two channels:
  #   - main push: builds + tags `:edge` and `:sha-<short>` for
  #     dev / beta testers tracking bleeding-edge.
  #   - tag push (vX.Y.Z): builds + tags `:vX.Y.Z`, `:X.Y`, `:latest`
  #     for customers who want batched, version-numbered releases.
  # See docs/release-pipeline.md for the full release ritual.
  push:
    branches: [main]
    tags:    ['v*']
    paths-ignore: []
  workflow_dispatch:

# Coalesce per-ref so back-to-back commits to the same branch or
# rapid tag pushes don't pile up on the runner. Different tags
# still produce distinct runs (each tag is a different ref → its
# own concurrency group) so we don't lose the :vX.Y.Z Docker
# tags anyone might pin to.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write    # GHCR push via GITHUB_TOKEN

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wattpost-appliance

jobs:
  build-and-push:
    name: Build + push appliance image
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Two channels:
          #   - main push       → :edge + :sha-<short>
          #   - tag push (v*)   → :vX.Y.Z, :X.Y, :latest
          # docker/metadata-action handles the "only fire this tag
          # type on the matching ref" logic — see "Behaviors" in
          # https://github.com/docker/metadata-action.
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.appliance
          # arm64 covers Pi 4 / 5 + Apple Silicon Linux VMs; amd64
          # covers everything else.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
