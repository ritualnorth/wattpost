name: Build appliance image

# Multi-arch (amd64 + arm64) Docker image for the WattPost appliance.
# Published to GHCR on every push to main that touches the appliance
# source. Users on a Linux host can `docker compose pull` to take
# updates — the in-container equivalent of the Pi's "Update now" button.
#
# Arm64 is the Pi 4 / Pi 5 case; amd64 covers homelab boxes, mini PCs,
# recycled laptops. Buildx with both targets in one workflow.

on:
  push:
    branches: [main]
    paths:
      - 'solar_monitor/**'
      - 'packaging/**'
      - 'pyproject.toml'
      - 'docs/**'
      - 'Dockerfile.appliance'
      - '.github/workflows/build-appliance-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write    # GHCR push via GITHUB_TOKEN

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wattpost-appliance

jobs:
  build-and-push:
    name: Build + push appliance image
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest follows main; sha-<short> pins for traceability.
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.appliance
          # arm64 covers Pi 4 / 5 + Apple Silicon Linux VMs; amd64
          # covers everything else.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
