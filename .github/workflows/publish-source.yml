name: Publish appliance source

# Builds a tar.gz of the appliance source on tagged releases and
# attaches it to the GitHub Release. This is what
# `/api/system/update/apply` on a paired appliance pulls down to
# get new features without a fresh SD-card flash.
#
# Tarball includes: solar_monitor/, packaging/, pyproject.toml,
# README.md. Excludes: cloud/ (private), .github/, dev artefacts.
#
# Only fires on `v*` tag pushes — NOT on every main commit. That
# way the manifest version bump (= "Update available" badge on
# every paired Pi appliance) only happens at deliberate release
# points, not on every fix commit. See docs/release-pipeline.md
# for the full ritual.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Coalesce back-to-back tags: only the newest tarball matters, so
# cancel any older in-flight run.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write   # attach the source tarball to the GitHub Release

jobs:
  build-and-publish:
    name: tar + attach to GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history so we can stamp the tarball with the commit SHA.
          fetch-depth: 0

      - name: Build tarball
        id: tarball
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short HEAD)
          VERSION=$(grep -E '^__version__' solar_monitor/__init__.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          NAME="wattpost-source-${VERSION}+${SHA}.tar.gz"
          # Output goes inside $GITHUB_WORKSPACE because appleboy/scp-action
          # runs in a Docker container that only mounts the workspace —
          # /tmp on the host isn't visible to it.
          OUT_DIR="${GITHUB_WORKSPACE}/_release_out"
          mkdir -p "${OUT_DIR}"
          # -h dereferences symlinks at archive time. solar_monitor/web/docs/
          # is a symlink into /docs/ (single source of truth for docs across
          # appliance + cloud); -h folds the real .md files into the tarball
          # so the appliance is self-contained after install.
          tar -czhf "${OUT_DIR}/${NAME}" \
              --exclude='./solar_monitor/__pycache__' \
              --exclude='./solar_monitor/**/__pycache__' \
              --exclude='*.egg-info' \
              ./solar_monitor ./packaging ./pyproject.toml ./README.md
          ( cd "${OUT_DIR}" && sha256sum "${NAME}" > "${NAME}.sha256" )
          # Stable-named copies so GitHub's permanent
          # releases/latest/download/wattpost-source.tar.gz URL resolves
          # to the newest release — the appliance update helper and the
          # cloud read these. The version lives in the release tag.
          cp "${OUT_DIR}/${NAME}" "${OUT_DIR}/wattpost-source.tar.gz"
          ( cd "${OUT_DIR}" && sha256sum wattpost-source.tar.gz > wattpost-source.tar.gz.sha256 )
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "out_dir=${OUT_DIR}" >> "$GITHUB_OUTPUT"
          ls -lah "${OUT_DIR}"

      # Attach the source tarball + sha256 to the GitHub Release (the
      # .img.xz is attached by build-image.yml). GitHub Releases is the
      # canonical home the cloud's /api/releases/latest reads from.
      - name: Attach source to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.tarball.outputs.out_dir }}/wattpost-source.tar.gz
            ${{ steps.tarball.outputs.out_dir }}/wattpost-source.tar.gz.sha256
          # RC tags (v…-rcN) publish as prereleases — keeps the beta channel
          # and `releases/latest` (stable) correctly separated.
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
