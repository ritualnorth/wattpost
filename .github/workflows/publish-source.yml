name: Publish appliance source

# Builds a tar.gz of the appliance source on tagged releases and
# uploads it to releases.wattpost.io. This is what
# `/api/system/update/apply` on a paired appliance pulls down to
# get new features without a fresh SD-card flash.
#
# Tarball includes: solar_monitor/, packaging/, pyproject.toml,
# README.md. Excludes: cloud/ (private), .github/, dev artefacts.
#
# Only fires on `v*` tag pushes — NOT on every main commit. That
# way the manifest version bump (= "Update available" badge on
# every paired Pi appliance) only happens at deliberate release
# points, not on every fix commit. See docs/release-pipeline.md
# for the full ritual.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    name: tar + scp to VPS
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history so we can stamp the tarball with the commit SHA.
          fetch-depth: 0

      - name: Build tarball
        id: tarball
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short HEAD)
          VERSION=$(grep -E '^__version__' solar_monitor/__init__.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          NAME="wattpost-source-${VERSION}+${SHA}.tar.gz"
          # Output goes inside $GITHUB_WORKSPACE because appleboy/scp-action
          # runs in a Docker container that only mounts the workspace —
          # /tmp on the host isn't visible to it.
          OUT_DIR="${GITHUB_WORKSPACE}/_release_out"
          mkdir -p "${OUT_DIR}"
          # -h dereferences symlinks at archive time. solar_monitor/web/docs/
          # is a symlink into /docs/ (single source of truth for docs across
          # appliance + cloud); -h folds the real .md files into the tarball
          # so the appliance is self-contained after install.
          tar -czhf "${OUT_DIR}/${NAME}" \
              --exclude='./solar_monitor/__pycache__' \
              --exclude='./solar_monitor/**/__pycache__' \
              --exclude='*.egg-info' \
              ./solar_monitor ./packaging ./pyproject.toml ./README.md
          ( cd "${OUT_DIR}" && sha256sum "${NAME}" > "${NAME}.sha256" )
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "out_dir=${OUT_DIR}" >> "$GITHUB_OUTPUT"
          ls -lah "${OUT_DIR}"

      - name: Upload to releases.wattpost.io
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "_release_out/*"
          target: /srv/wattpost-releases/source/
          strip_components: 1

      - name: Upload CHANGELOG.md to releases root
        # Lives at the releases-root, not under source/, because it
        # describes the cross-cutting release history rather than
        # belonging to any one tarball. The appliance's update
        # checker fetches it on every manifest poll so the dashboard
        # can preview release notes BEFORE the user installs the
        # new version.
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "CHANGELOG.md"
          target: /srv/wattpost-releases/

      - name: Update `latest` symlink + manifest version
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEW_VERSION: ${{ steps.tarball.outputs.version }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: NEW_VERSION
          script: |
            set -euo pipefail
            cd /srv/wattpost-releases/source
            newest=$(ls -1t wattpost-source-*.tar.gz 2>/dev/null | head -1)
            if [ -n "$newest" ]; then
              ln -sfn "$newest" latest.tar.gz
              ln -sfn "$newest.sha256" latest.tar.gz.sha256
              echo "latest.tar.gz → $newest"
            else
              echo "no source tarballs found" >&2
              exit 1
            fi
            # Keep only the 10 most recent tarballs — older ones are
            # historical only; appliances pulling "latest" don't care.
            ls -1t wattpost-source-*.tar.gz 2>/dev/null | tail -n +11 \
                | xargs -r rm -f
            ls -1t wattpost-source-*.tar.gz.sha256 2>/dev/null | tail -n +11 \
                | xargs -r rm -f

            # Bump the version + source SHA + released_at on the
            # img/manifest.json so paired appliances see "Update
            # available" within the next manifest-poll cycle. Image
            # fields (image_url, image_filename, sha256, size_bytes)
            # are left untouched — they're owned by pi-gen's
            # build-image.yml, not source-only releases.
            MANIFEST=/srv/wattpost-releases/img/manifest.json
            if [ -f "${MANIFEST}" ]; then
              SOURCE_SHA=$(awk '{print $1}' "${newest}.sha256")
              NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
              python3 - "$MANIFEST" "$NEW_VERSION" "$SOURCE_SHA" "$NOW" <<'PY'
            import json, sys, pathlib
            path, version, src_sha, now = sys.argv[1:]
            p = pathlib.Path(path)
            m = json.loads(p.read_text())
            m["version"]     = version
            m["released_at"] = now
            m["source_sha256"] = src_sha
            # Relative URL — the appliance dashboard resolves it
            # against its own origin so it works on Pi (LAN IP),
            # Docker (LAN IP), or via cloudflared tunnel without
            # the manifest needing to know the host. Same content
            # is also at wattpost.io/docs/release-notes for users
            # who land on the marketing site.
            m["release_url"] = "/docs/release-notes"
            p.write_text(json.dumps(m, indent=2) + "\n")
            print(f"manifest: version={version} released_at={now}")
            PY
            else
              echo "manifest.json missing — skipping manifest bump"
            fi
